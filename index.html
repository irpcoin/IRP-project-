<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRP | Iran Revival Project Official</title>
    <style>
        :root { --gold: #f3ba2f; --glow: rgba(243, 186, 47, 0.5); }
        
        body {
            margin: 0; padding: 0;
            /* عکس سایت شما در پس‌زمینه */
            background: url('https://i.postimg.cc/Pr7NKHfM/unnamed-1-removebg-preview.png') no-repeat center center fixed;
            background-size: cover;
            color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.88); z-index: 1;
        }

        .main-card {
            position: relative; z-index: 10;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 2px solid var(--gold);
            padding: 100px 30px 60px; /* فضای بیشتر برای لوگوی بزرگ */
            border-radius: 50px;
            text-align: center;
            max-width: 550px; width: 90%;
            box-shadow: 0 0 70px rgba(0,0,0,1), 0 0 30px var(--glow);
        }

        /* لوگوی بسیار بزرگ و گرد */
        .logo-wrap {
            width: 200px; height: 200px;
            margin: -200px auto 30px; /* قرارگیری نیمی از لوگو بیرون کادر برای زیبایی */
            background: #000;
            border-radius: 50%; /* دایره کامل */
            padding: 10px;
            border: 5px solid var(--gold);
            box-shadow: 0 0 50px var(--glow);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-img {
            width: 100%; height: 100%;
            object-fit: contain; /* تضمین گرد ماندن */
        }

        h1 { font-size: 3rem; color: var(--gold); margin: 0; font-weight: 900; letter-spacing: 2px; }
        
        .mission-text {
            font-size: 1.3rem; line-height: 1.6; margin: 30px 0;
            color: #efefef; text-shadow: 0 2px 5px #000;
        }

        .contract-box {
            background: #000; border: 1px dashed var(--gold);
            padding: 15px; border-radius: 15px; margin: 30px 0;
        }

        .address { font-family: monospace; color: #00ffcc; font-size: 0.85rem; word-break: break-all; }

        .btn {
            background: var(--gold); color: #000;
            padding: 20px 60px; border-radius: 100px;
            text-decoration: none; font-weight: 900; font-size: 1.4rem;
            display: inline-block; transition: 0.4s;
            box-shadow: 0 10px 30px rgba(243, 186, 47, 0.4);
        }
        .btn:hover { transform: scale(1.1); background: #fff; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="logo-wrap">
            <img src="https://i.postimg.cc/VvG2Q1KN/unnamed-1-2.png" class="logo-img" alt="IRP">
        </div>
        
        <h1>IRP TOKEN</h1>
        
        <div class="mission-text">
            <strong>HOLD, DON'T TRADE</strong><br>
            A tribute to Iran's martyrs and the legacy of the Shah.<br>
            The next generation legacy project.
        </div>

        <div class="contract-box">
            <div style="color:var(--gold); font-size:0.7rem; margin-bottom:5px;">OFFICIAL SMART CONTRACT</div>
            <div class="address">0xe28f35e98380299539308e6f1642823678096e6d</div>
        </div>

        <a href="https://pancakeswap.finance/swap?outputCurrency=0xe28f35e98380299539308e6f1642823678096e6d" class="btn">BUY IRP NOW</a>
    </div>
</body>
</html>
