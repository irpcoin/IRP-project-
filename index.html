<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRP - Iran Revival Project</title>
    <style>
        :root { --gold: #f3ba2f; --dark: #0b0e11; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #0b0e11, #1e2329, #0b0e11, #181a20);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            box-shadow: 0 0 20px rgba(243, 186, 47, 0.3);
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .logo:hover { transform: scale(1.1); }
        
        h1 { color: var(--gold); margin: 10px 0; font-size: 2.2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        p { color: #b7bdc6; line-height: 1.6; }
        
        .contract-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 25px 0;
            border: 1px dashed var(--gold);
            word-break: break-all;
            font-family: monospace;
            color: #00ffcc;
        }
        
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        .feat-item { font-size: 0.8rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }

        .btn {
            display: inline-block;
            background: var(--gold);
            color: black;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(243, 186, 47, 0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(243, 186, 47, 0.6); background: #ffc843; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://i.postimg.cc/VvG2Q1KN/unnamed-1-2.png" alt="IRP Logo" class="logo">
        <h1>Iran Revival Project</h1>
        <p>آینده‌ای روشن با توکن IRP</p>
        
        <div class="features">
            <div class="feat-item">🔒 امنیت بالا</div>
            <div class="feat-item">💎 شفافیت</div>
            <div class="feat-item">🚀 رشد مستمر</div>
        </div>

        <p>آدرس قرارداد هوشمند:</p>
        <div class="contract-box">0xe28f35e98380299539308e6f1642823678096e6d</div>
        
        <a href="https://pancakeswap.finance/swap?outputCurrency=0xe28f35e98380299539308e6f1642823678096e6d" class="btn">خرید توکن IRP</a>
    </div>
</body>
</html>
