<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRP | Iran Revival Project Official Site</title>
    <style>
        :root { --gold: #f3ba2f; }
        
        body {
            margin: 0; padding: 0;
            /* پس‌زمینه جدید: بافت سنتی ایرانی تیره و طلایی */
            background-image: url('https://img.cryptokitties.co/0x06012c8cf97bead5deae237070f9587f8e7a266d/1488114.png'), radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            background-repeat: repeat, no-repeat;
            background-size: 300px, cover; /* بافت اسلیمی تکرار شونده */
            color: white; font-family: 'Arial Black', Gadget, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        /* لایه تیره برای عمق دادن و خوانایی */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: -1;
        }

        .card {
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid var(--gold);
            padding: 90px 25px 50px; border-radius: 40px;
            text-align: center; max-width: 500px; width: 90%;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
        }

        .logo-container {
            width: 170px; height: 170px;
            margin: -175px auto 30px;
            background: #000; border-radius: 50%;
            border: 4px solid var(--gold);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(243, 186, 47, 0.5);
        }

        .logo-img {
            /* درشت کردن لوگو تا کل دایره را پر کند */
            width: 280%; 
            height: 280%;
            object-fit: contain;
        }

        h1 { font-size: 2.6rem; color: var(--gold); margin: 0; font-weight: 900; letter-spacing: 1px; }
        
        .mission-text { font-size: 1.25rem; line-height: 1.6; margin: 35px 0; color: #eee; }
        
        .contract-box { background: #000; padding: 15px; border-radius: 12px; border: 1px dashed var(--gold); margin: 25px 0; }
        
        .address { font-family: monospace; color: #00ffcc; font-size: 0.8rem; word-break: break-all; }

        .btn { display: inline-block; background: var(--gold); color: #000; padding: 18px 55px; border-radius: 50px; text-decoration: none; font-weight: 900; font-size: 1.25rem; box-shadow: 0 10px 20px rgba(243, 186, 47, 0.3); }
        .btn:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container">
            <img src="https://i.postimg.cc/VvG2Q1KN/unnamed-1-2.png" class="logo-img" alt="IRP Logo">
        </div>
        
        <h1>IRP TOKEN</h1>
        
        <div class="mission-text">
            <strong>HOLD, DON'T TRADE</strong><br><br>
            A tribute to Iran's martyrs and the legacy of the Shah. The next generation legacy project.
        </div>

        <div class="contract-box">
            <div style="color:var(--gold); font-size: 0.7rem; margin-bottom: 5px;">OFFICIAL SMART CONTRACT</div>
            <div class="address">0xe28f35e98380299539308e6f1642823678096e6d</div>
        </div>

        <a href="https://pancakeswap.finance/swap?outputCurrency=0xe28f35e98380299539308e6f1642823678096e6d" class="btn">BUY IRP NOW</a>
    </div>
</body>
</html>
