<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRP Official | Iran Revival Project</title>
    <style>
        body {
            margin: 0; padding: 0;
            /* قرار دادن عکس شما در پس‌زمینه به صورت سراسری */
            background: url('https://i.postimg.cc/Pr7NKHfM/unnamed-1-removebg-preview.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #000;
            color: white; font-family: 'Arial Black', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        /* لایه تیره برای اینکه متن‌ها روی عکس پس‌زمینه خوانا باشند */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1;
        }
        .main-container {
            position: relative; z-index: 10;
            width: 90%; max-width: 500px;
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid #f3ba2f; border-radius: 40px;
            padding: 90px 20px 40px; text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        .logo-wrap {
            width: 180px; height: 180px;
            background: #000; border: 4px solid #f3ba2f;
            border-radius: 50%; margin: -185px auto 30px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(243, 186, 47, 0.5);
        }
        .logo-wrap img {
            width: 100%; height: 100%;
            object-fit: cover; /* حفظ همان بزرگی عالی در تصویر آخر شما */
        }
        h1 { color: #f3ba2f; font-size: 2.6rem; margin: 0; letter-spacing: 1px; }
        .description { font-size: 1.2rem; line-height: 1.6; margin: 35px 0; color: #efefef; }
        .description strong { color: #f3ba2f; }
        .contract-box {
            background: #000; border: 1px dashed #f3ba2f;
            padding: 15px; border-radius: 12px; margin-bottom: 30px;
        }
        .address { font-family: monospace; color: #00ffcc; font-size: 0.85rem; word-break: break-all; }
        .btn {
            display: inline-block; background: linear-gradient(135deg, #f3ba2f, #ffaa00);
            color: #000; padding: 18px 0; width: 100%;
            border-radius: 50px; text-decoration: none;
            font-weight: 900; font-size: 1.3rem; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px #f3ba2f; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="logo-wrap">
            <img src="https://i.postimg.cc/VvG2Q1KN/unnamed-1-2.png" alt="IRP">
        </div>
        <h1>IRP TOKEN</h1>
        <div class="description">
            <strong>HOLD, DON'T TRADE</strong><br><br>
            A tribute to Iran's martyrs and the legacy of the Shah. 
            The next generation legacy project like PEPE & SHIBA.
        </div>
        <div class="contract-box">
            <span style="color:#f3ba2f; font-size: 0.7rem; display: block; margin-bottom: 5px;">OFFICIAL SMART CONTRACT</span>
            <div class="address">0xe28f35e98380299539308e6f1642823678096e6d</div>
        </div>
        <a href="https://pancakeswap.finance/swap?outputCurrency=0xe28f35e98380299539308e6f1642823678096e6d" class="btn">BUY IRP NOW</a>
    </div>
</body>
</html>
